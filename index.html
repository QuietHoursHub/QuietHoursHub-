<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuietHoursHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

  <h1 class="title">QuietHoursHub</h1>

  <div class="grid">

    <!-- TIMER -->
    <div class="card">
      <h2>⏱️ Focus Timer</h2>
      <div id="time">25:00</div>
      <button onclick="startTimer()">Start</button>
      <button onclick="resetTimer()">Reset</button>
    </div>

    <!-- TASK TRACKER -->
    <div class="card">
      <h2>✅ Tasks</h2>
      <input type="text" id="taskInput" placeholder="Add task...">
      <button onclick="addTask()">Add</button>
      <ul id="taskList"></ul>
    </div>

    <!-- STREAK -->
    <div class="card">
      <h2>🔥 Streak</h2>
      <p id="streak">0 days</p>
    </div>

    <!-- FEEDBACK -->
    <div class="card">
      <h2>💬 Feedback</h2>
      <textarea id="feedbackInput" placeholder="Write your feedback..."></textarea>
      <button onclick="submitFeedback()">Submit</button>
      <p id="feedbackMsg"></p>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
